{% extends "base.html" %}
{% block content %}
<h4 class="mb-3">Manage Products</h4>

<form method="post" class="mb-3">
  <div class="row g-2">
    <div class="col-md-4">
      <input type="text" name="name" class="form-control" placeholder="Product name" required>
    </div>
    <div class="col-md-2">
      <input type="number" step="0.01" name="price" class="form-control" placeholder="Price (₹)">
    </div>
    <div class="col-md-2">
      <input type="number" name="qty" class="form-control" placeholder="Qty">
    </div>
    <div class="col-md-2">
      <input type="number" name="reorder_level" class="form-control" placeholder="Reorder level">
    </div>
    <div class="col-md-2">
      <button class="btn btn-primary" type="submit">Add Product</button>
    </div>
  </div>
</form>

<table class="table table-bordered">
  <thead>
    <tr>
      <th>Name</th>
      <th>Price</th>
      <th>Qty</th>
      <th>Reorder Level</th>
      <th>Actions</th>
    </tr>
  </thead>
  <tbody>
    {% for p in products %}
    <tr class="{% if p.qty <= p.reorder_level %}low-stock{% endif %}">
      <td>{{ p['name'] }}</td>
      <td>₹{{ '%.2f'|format(p.price) }}</td>
      <td>{{ p.qty }}</td>
      <td>{{ p.reorder_level }}</td>
      <td>
        <a class="btn btn-secondary btn-sm" href="{{ url_for('edit_product', pid=p.id) }}">Edit</a>
        <form method="post" action="{{ url_for('delete_product', pid=p.id) }}" style="display:inline-block" onsubmit="return confirm('Delete product?');">
          <button class="btn btn-danger btn-sm" type="submit">Delete</button>
        </form>
      </td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
