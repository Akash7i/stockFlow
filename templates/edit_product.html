{% extends "base.html" %}
{% block content %}
<h4>📦 Edit / Manage Products</h4>

<!-- Quick stock update -->
<div class="card mb-4 p-3">
  <h5>➕ Add Quantity</h5>
  <form method="post" action="{{ url_for('edit_product', pid=p.id) }}">
    <div class="mb-3">
      <label class="form-label">Select Product</label>
      <select name="selected_product" class="form-control" onchange="window.location.href='/product/edit/' + this.value">
        {% for prod in products %}
          <option value="{{ prod.id }}" {% if prod.id == p.id %}selected{% endif %}>
            {{ prod.name }}
          </option>
        {% endfor %}
        <option value="new">➕ Add New Product</option>
      </select>
    </div>

    <div class="mb-3">
      <label class="form-label">Current Quantity: {{ p.qty }}</label><br>
      <label class="form-label">Add More</label>
      <input type="number" name="add_qty" class="form-control" min="1">
    </div>
    <button class="btn btn-success" type="submit" name="action" value="add_qty">Update Stock</button>
  </form>
</div>

<!-- Full product details update -->
<div class="card p-3">
  <h5>✏️ Edit Product Details</h5>
  <form method="post" action="{{ url_for('edit_product', pid=p.id) }}">
    {% if p %}
      <div class="mb-3">
        <label class="form-label">Name</label>
        <input type="text" name="name" class="form-control" value="{{ p['name'] }}" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Price (₹)</label>
        <input type="number" step="0.01" name="price" class="form-control" value="{{ p.price }}">
      </div>
      <div class="mb-3">
        <label class="form-label">Quantity</label>
        <input type="number" name="qty" class="form-control" value="{{ p.qty }}">
      </div>
      <div class="mb-3">
        <label class="form-label">Reorder Level</label>
        <input type="number" name="reorder_level" class="form-control" value="{{ p.reorder_level }}">
      </div>
    {% else %}
      <!-- Add new product form -->
      <div class="mb-3">
        <label class="form-label">Product Name</label>
        <input type="text" name="name" class="form-control" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Price (₹)</label>
        <input type="number" step="0.01" name="price" class="form-control">
      </div>
      <div class="mb-3">
        <label class="form-label">Initial Quantity</label>
        <input type="number" name="qty" class="form-control">
      </div>
      <div class="mb-3">
        <label class="form-label">Reorder Level</label>
        <input type="number" name="reorder_level" class="form-control">
      </div>
    {% endif %}
    
    <button class="btn btn-primary" type="submit" name="action" value="edit_all">
      {% if p %}Save Changes{% else %}Add Product{% endif %}
    </button>
    <a class="btn btn-secondary" href="{{ url_for('products_page') }}">Cancel</a>
  </form>
</div>
{% endblock %}
